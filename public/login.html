<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARQON - Login/Cadastro</title>
    <link rel="stylesheet" href="style/reset.css">
    <link rel="stylesheet" href="style/login.css">
</head>
<body>

<section class="arqon-register-section">

    <a href="index.html" class="arqon-btn-back">
        <span class="back-icon">&#8592;</span>
        <span class="back-text">VOLTAR AO INÍCIO</span>
    </a>

  <div class="arqon-register-layout">
    
    <div class="arqon-visual-pane">
      <div class="arqon-visual-overlay"></div>
      <div class="arqon-brand-content">
        <h1 class="arqon-logo">ARQON</h1>
        <p class="arqon-tagline">STYLE <span>///</span> ACCESS</p>
        <div class="arqon-abstract-shape"></div>
      </div>
    </div>

    <div class="arqon-form-pane">
      <div class="arqon-form-container">
        
        <form id="arqon-register-form" class="arqon-form" novalidate></form>

      </div>
    </div>

  </div>
</section>

<script src="scripts/login.js"></script>
</body>
</html>
